name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev unzip zip build-essential libbz2-dev cmake
        pip install --upgrade pip
        # Cython ကို Kivy နဲ့ အကိုက်ညီဆုံးဖြစ်တဲ့ 0.29.33 ကိုသာ အတိအကျသုံးပါမည်
        pip install buildozer cython==0.29.33 virtualenv
    - name: Build APK
      run: |
        yes | buildozer -v android debug
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bible-Android-APK
        path: bin/*.apk
