name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04  # ubuntu-latest အစား 22.04 ကိုသုံးတာက Buildozer အတွက် ပိုစိတ်ချရပါတယ်

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        # build-essential နဲ့ libbz2-dev ကို ထပ်ဖြည့်ထားပါတယ်
        sudo apt-get install -y openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev unzip zip build-essential libbz2-dev
        pip install --upgrade pip
        # Cython 3.0 အထက်ဆိုရင် Kivy က Error တက်တတ်လို့ version 3 အောက်ကို သတ်မှတ်ပေးထားပါတယ်
        pip install buildozer "cython<3.0.0" virtualenv

    - name: Build APK (Auto-accept licenses)
      run: yes | buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bible-Android-APK
        path: bin/*.apk
